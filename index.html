<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>apt_review.xlsx - Excel</title>
<style>
  :root{
    --excel-green:#107c41;
    --excel-green-dark:#0c5e31;
    --ribbon-bg:#f3f2f1;
    --sheet-bg:#ffffff;
    --grid-line:#d4d4d4;
    --header-bg:#f3f2f1;
    --text:#1a1a1a;
    --muted:#6b6b6b;
    --up:#c00000;
    --cancel:#999;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Malgun Gothic","맑은 고딕",sans-serif;
    background:#e9e9e9;
    color:var(--text);
    font-size:13px;
  }
  .titlebar{
    background:var(--excel-green);
    color:#fff;
    padding:6px 14px;
    font-size:13px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .titlebar .icon{
    width:16px;height:16px;background:#fff;border-radius:2px;
    display:inline-flex;align-items:center;justify-content:center;
    color:var(--excel-green);font-weight:bold;font-size:10px;
  }
  .ribbon{
    background:var(--ribbon-bg);
    border-bottom:1px solid var(--grid-line);
    padding:0 10px;
  }
  .ribbon-tabs{
    display:flex;
    gap:18px;
    font-size:12px;
    padding-top:4px;
  }
  .ribbon-tabs span{
    padding:6px 4px;
    cursor:default;
    color:var(--muted);
  }
  .ribbon-tabs span.active{
    color:var(--excel-green-dark);
    font-weight:bold;
    border-bottom:2px solid var(--excel-green);
  }
  .ribbon-body{
    display:flex;
    align-items:center;
    gap:14px;
    padding:6px 4px 8px;
    border-top:1px solid #fff;
    overflow-x:auto;
  }
  .ribbon-group{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    padding:2px 10px;
    border-right:1px solid var(--grid-line);
    min-width:fit-content;
  }
  .ribbon-group .controls{
    display:flex;
    gap:6px;
    align-items:center;
  }
  .ribbon-btn{
    background:#fff;
    border:1px solid var(--grid-line);
    border-radius:3px;
    padding:4px 8px;
    font-size:11px;
    color:var(--text);
    cursor:pointer;
  }
  .ribbon-btn:hover{ background:#e6f2ec; border-color:var(--excel-green); }
  .ribbon-label{
    font-size:10px;
    color:var(--muted);
  }
  select.ribbon-select{
    font-size:11px;
    padding:3px 4px;
    border:1px solid var(--grid-line);
    border-radius:3px;
    background:#fff;
  }
  .formula-bar{
    display:flex;
    align-items:center;
    background:#fff;
    border-bottom:1px solid var(--grid-line);
    padding:4px 8px;
    gap:8px;
    font-size:12px;
  }
  .name-box{
    border:1px solid var(--grid-line);
    padding:3px 8px;
    width:60px;
    background:#fff;
    text-align:center;
    color:var(--muted);
  }
  .fx-icon{ color:var(--muted); font-style:italic; padding:0 4px;}
  .formula-input{
    flex:1;
    border:none;
    outline:none;
    padding:4px 6px;
    color:#444;
  }
  .note{
    font-size:11px;
    color:var(--muted);
    padding:2px 10px 6px;
  }

  /* 좌/우 분할 시트 레이아웃 */
  .split-sheets{
    display:flex;
    gap:1px;
    background:var(--grid-line);
    height:60vh;
    min-height:380px;
  }
  .sheet-pane{
    flex:1;
    display:flex;
    flex-direction:column;
    background:var(--sheet-bg);
    min-width:0;
  }
  .pane-tab{
    background:var(--header-bg);
    color:var(--excel-green-dark);
    font-weight:bold;
    font-size:12px;
    padding:6px 10px;
    border-bottom:2px solid var(--excel-green);
  }
  .pane-scroll{
    overflow:auto;
    flex:1;
  }
  table.grid{
    border-collapse:collapse;
    width:100%;
    table-layout:fixed;
  }
  table.grid th, table.grid td{
    border:1px solid var(--grid-line);
    padding:5px 6px;
    font-size:12px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  table.grid thead th{
    background:var(--header-bg);
    color:var(--muted);
    font-weight:normal;
    text-align:center;
    position:sticky;
    top:0;
    z-index:2;
  }
  table.grid tbody th{
    background:var(--header-bg);
    color:var(--muted);
    font-weight:normal;
    text-align:center;
    position:sticky;
    left:0;
  }
  .col-row1 th{ background:var(--excel-green); color:#fff; font-weight:bold; text-align:left; }
  .amt-up{ color:var(--up); font-weight:bold; }
  .cancelled{ color:var(--cancel); text-decoration:line-through; }
  .pyeong{ color:var(--muted); font-size:11px; }

  .flagship-row td{ font-weight:bold; }
  .flagship-badge{
    display:inline-block;
    background:var(--excel-green);
    color:#fff;
    font-size:9px;
    font-weight:bold;
    padding:1px 4px;
    border-radius:2px;
    margin-right:4px;
    vertical-align:middle;
  }
  .gukpyeong-badge{
    font-size:9px;
    color:#b8860b;
    font-weight:bold;
    margin-left:2px;
  }
  .trend-inline{ font-weight:normal; font-size:10px; color:var(--muted); }
  .trend-up{ color:var(--up); font-weight:bold; }
  .trend-down{ color:#1565c0; font-weight:bold; }
  .trend-flat{ color:var(--muted); }

  .status-bar{
    background:var(--excel-green);
    color:#fff;
    font-size:11px;
    padding:4px 14px;
    display:flex;
    justify-content:space-between;
  }

  .modal-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
    align-items:center;
    justify-content:center;
    z-index:10;
  }
  .modal-overlay.open{ display:flex; }
  .modal-box{
    background:#fff;
    border-radius:4px;
    width:320px;
    max-width:90vw;
    padding:14px;
    box-shadow:0 4px 16px rgba(0,0,0,0.25);
  }
  .modal-title{
    font-weight:bold;
    font-size:13px;
    margin-bottom:8px;
    color:var(--excel-green-dark);
  }
  .modal-input{
    width:100%;
    padding:6px 8px;
    border:1px solid var(--grid-line);
    border-radius:3px;
    font-size:12px;
    box-sizing:border-box;
  }
  .modal-results{
    margin-top:8px;
    max-height:220px;
    overflow:auto;
    border:1px solid var(--grid-line);
    border-radius:3px;
  }
  .modal-result-item{
    padding:6px 8px;
    font-size:12px;
    cursor:pointer;
    border-bottom:1px solid var(--grid-line);
    display:flex;
    justify-content:space-between;
    gap:8px;
  }
  .modal-result-item:last-child{ border-bottom:none; }
  .modal-result-item:hover{ background:#e6f2ec; }
  .modal-result-empty{
    padding:10px 8px;
    font-size:11px;
    color:var(--muted);
    text-align:center;
  }
  .modal-actions{
    margin-top:10px;
    text-align:right;
  }

  @media (max-width:760px){
    .split-sheets{ flex-direction:column; height:auto; }
    .sheet-pane{ height:50vh; min-height:280px; }
    .ribbon-body{ gap:8px; }
    .ribbon-group{ padding:2px 6px; }
    table.grid th, table.grid td{ font-size:11px; padding:4px 5px; }
  }
</style>
</head>
<body>

<div class="titlebar">
  <span class="icon">X</span>
  apt_review.xlsx - Excel
</div>

<div class="ribbon">
  <div class="ribbon-tabs">
    <span class="active">홈</span><span>삽입</span><span>페이지 레이아웃</span><span>수식</span><span>데이터</span><span>검토</span><span>보기</span>
  </div>
  <div class="ribbon-body">
    <div class="ribbon-group">
      <div class="controls">
        <label class="ribbon-label">지역</label>
        <select class="ribbon-select" id="lawdSelect"></select>
        <label class="ribbon-label">계약월</label>
        <select class="ribbon-select" id="ymdSelect"></select>
        <span class="ribbon-btn" id="refreshBtn">새로고침</span>
      </div>
      <span class="ribbon-label">실거래가 조회</span>
    </div>
    <div class="ribbon-group">
      <div class="controls">
        <span class="ribbon-btn" id="addWatchBtn">관심단지 추가</span>
      </div>
      <span class="ribbon-label">관심단지 관리</span>
    </div>
  </div>
</div>

<div class="formula-bar">
  <div class="name-box">A1</div>
  <div class="fx-icon">fx</div>
  <input class="formula-input" id="formulaInput" readonly value="=APTPRICE(LAWD_CD,DEAL_YMD)">
</div>
<div class="note" id="statusNote">데이터 조회 중...</div>

<div class="split-sheets">
  <div class="sheet-pane">
    <div class="pane-tab">대장단지</div>
    <div class="pane-scroll" id="watchArea"></div>
    <div class="pane-tab">관심단지</div>
    <div class="pane-scroll" id="watchlistArea"></div>
  </div>
  <div class="sheet-pane">
    <div class="pane-tab">실거래 속보</div>
    <div class="pane-scroll" id="feedArea"></div>
  </div>
</div>

<div class="status-bar">
  <span id="statusLeft">준비</span>
  <span id="statusRight">국토교통부 실거래가 공개시스템 기준 · 1일 1회 갱신</span>
</div>

<div class="modal-overlay" id="watchModalOverlay">
  <div class="modal-box">
    <div class="modal-title">관심단지 추가</div>
    <input type="text" class="modal-input" id="watchSearchInput" placeholder="단지명을 입력하세요 (예: 개포)" autocomplete="off">
    <div class="modal-results" id="watchSearchResults"></div>
    <div class="modal-actions">
      <span class="ribbon-btn" id="watchModalCloseBtn">닫기</span>
    </div>
  </div>
</div>

<script>
// ────────────────────────────────────────────────
// 서울 25개구 LAWD_CD 매핑 (국토교통부 법정동코드 기준 추출)
// ────────────────────────────────────────────────
const SEOUL_GU = [
  {lawd_cd:"11110", name:"종로구"}, {lawd_cd:"11140", name:"중구"},
  {lawd_cd:"11170", name:"용산구"}, {lawd_cd:"11200", name:"성동구"},
  {lawd_cd:"11215", name:"광진구"}, {lawd_cd:"11230", name:"동대문구"},
  {lawd_cd:"11260", name:"중랑구"}, {lawd_cd:"11290", name:"성북구"},
  {lawd_cd:"11305", name:"강북구"}, {lawd_cd:"11320", name:"도봉구"},
  {lawd_cd:"11350", name:"노원구"}, {lawd_cd:"11380", name:"은평구"},
  {lawd_cd:"11410", name:"서대문구"}, {lawd_cd:"11440", name:"마포구"},
  {lawd_cd:"11470", name:"양천구"}, {lawd_cd:"11500", name:"강서구"},
  {lawd_cd:"11530", name:"구로구"}, {lawd_cd:"11545", name:"금천구"},
  {lawd_cd:"11560", name:"영등포구"}, {lawd_cd:"11590", name:"동작구"},
  {lawd_cd:"11620", name:"관악구"}, {lawd_cd:"11650", name:"서초구"},
  {lawd_cd:"11680", name:"강남구"}, {lawd_cd:"11710", name:"송파구"},
  {lawd_cd:"11740", name:"강동구"},
];

// ────────────────────────────────────────────────
// 샘플 데이터 (2026-06-30 강남구 11680 / 202605 실제 API 호출 결과 일부 기반)
// 실제 배포 시 /api/apt-trade?lawdCd=...&dealYmd=... 호출로 대체됨
// ────────────────────────────────────────────────
const SAMPLE_ITEMS = [
  {aptNm:"샘터마을", umdNm:"일원동", excluUseAr:152.7, dealYear:"2026", dealMonth:"5", dealDay:"30", dealAmountManwon:330000, floor:"4", buildYear:"1994", dealingGbn:"중개거래", isCancelled:false},
  {aptNm:"개포래미안포레스트", umdNm:"개포동", excluUseAr:59.92, dealYear:"2026", dealMonth:"5", dealDay:"29", dealAmountManwon:260500, floor:"4", buildYear:"2020", dealingGbn:"중개거래", isCancelled:false},
  {aptNm:"삼성동중앙하이츠빌리지", umdNm:"삼성동", excluUseAr:59.98, dealYear:"2026", dealMonth:"5", dealDay:"30", dealAmountManwon:256000, floor:"19", buildYear:"2004", dealingGbn:"중개거래", isCancelled:false},
  {aptNm:"개포더샵트리에", umdNm:"개포동", excluUseAr:105.8244, dealYear:"2026", dealMonth:"5", dealDay:"27", dealAmountManwon:275000, floor:"4", buildYear:"2021", dealingGbn:"중개거래", isCancelled:false},
  {aptNm:"개포우성2", umdNm:"대치동", excluUseAr:84.69, dealYear:"2026", dealMonth:"5", dealDay:"28", dealAmountManwon:390000, floor:"10", buildYear:"1984", dealingGbn:"중개거래", isCancelled:false},
];

// 관심단지 등록은 로컬스토리지에 저장 (기획문서 원칙: 로그인 없이 사용)
const WATCH_KEY = "apt_review_watchlist";
function loadWatchlist(){
  try{ return JSON.parse(localStorage.getItem(WATCH_KEY)) || ["개포래미안포레스트", "샘터마을"]; }
  catch(e){ return ["개포래미안포레스트", "샘터마을"]; }
}
function saveWatchlist(list){
  localStorage.setItem(WATCH_KEY, JSON.stringify(list));
}

let currentItems = SAMPLE_ITEMS;
let usingLiveData = false;
let currentTrendDatasets = null;

// 억 단위, 소수점 첫째 자리까지 (예: 215000만원 → "21.5억")
function fmtAmount(manwon){
  if(manwon == null) return "-";
  const eok = Math.round(manwon / 1000) / 10;
  return `${eok % 1 === 0 ? eok.toFixed(0) : eok.toFixed(1)}억`;
}

// 전용면적(㎡) → "평(㎡)" 형식 문자열. 84~86㎡는 실제 시장에서 부르는 '34평(국민평형)'으로 표기
function fmtAreaPyeong(sqm){
  if(sqm == null) return "-";
  const pyeong = Math.round(sqm / 3.3058);
  const base = `${pyeong}평(${Math.round(sqm)}㎡)`;
  const isGukpyeong = pyeong >= 32 && pyeong <= 36;
  return isGukpyeong ? `${base}<span class="gukpyeong-badge">국평</span>` : base;
}

// 평당가(만원) = 거래금액 ÷ (전용면적/3.3058)
function calcPricePerPyeong(it){
  if(!it.excluUseAr || !it.dealAmountManwon) return null;
  const pyeong = it.excluUseAr / 3.3058;
  return Math.round(it.dealAmountManwon / pyeong);
}
function fmtPricePerPyeong(it){
  const v = calcPricePerPyeong(it);
  return v == null ? "-" : fmtAmount(v);
}

// 대장 단지 = 조회된 데이터에 등장하는 법정동마다 거래금액 최고가 건 1개씩
function getFlagshipsByDong(items){
  const byDong = new Map();
  items.forEach(it=>{
    const cur = byDong.get(it.umdNm);
    if(!cur || it.dealAmountManwon > cur.dealAmountManwon){
      byDong.set(it.umdNm, it);
    }
  });
  return Array.from(byDong.values());
}

function renderFlagshipSheet(){
  const flagships = getFlagshipsByDong(currentItems);

  let html = `<table class="grid">
    <thead>
      <tr class="col-row1">
        <th style="width:30px"></th>
        <th>A</th><th>B</th><th>C</th><th>D</th>
      </tr>
      <tr>
        <th></th><th>단지명</th><th>전용면적</th><th>거래금액</th><th>평당가</th>
      </tr>
    </thead>
    <tbody>`;
  flagships.forEach((it, i)=>{
    const cls = it.isCancelled ? "cancelled" : "";
    const trendMarkup = renderInlineTrend(getApartmentTrend(currentTrendDatasets, it.aptNm, it.excluUseAr));
    html += `<tr class="flagship-row">
      <th>${i+2}</th>
      <td class="${cls}"><span class="flagship-badge">${it.umdNm}</span>${it.aptNm}</td>
      <td class="${cls}">${fmtAreaPyeong(it.excluUseAr)}</td>
      <td class="${cls} amt-up">${fmtAmount(it.dealAmountManwon)}${trendMarkup}</td>
      <td class="${cls}">${fmtPricePerPyeong(it)}</td>
    </tr>`;
  });
  for(let i=flagships.length; i<8; i++){
    html += `<tr><th>${i+2}</th><td></td><td></td><td></td><td></td></tr>`;
  }
  html += `</tbody></table>`;
  return html;
}

function renderWatchlistSheet(){
  const watchlist = loadWatchlist();
  const items = currentItems.filter(it => watchlist.includes(it.aptNm));

  let html = `<table class="grid">
    <thead>
      <tr class="col-row1">
        <th style="width:30px"></th>
        <th>A</th><th>B</th><th>C</th><th>D</th>
      </tr>
      <tr>
        <th></th><th>단지명</th><th>전용면적</th><th>거래금액</th><th>평당가</th>
      </tr>
    </thead>
    <tbody>`;
  items.forEach((it, i)=>{
    const cls = it.isCancelled ? "cancelled" : "";
    html += `<tr>
      <th>${i+2}</th>
      <td class="${cls}">${it.aptNm}</td>
      <td class="${cls}">${fmtAreaPyeong(it.excluUseAr)}</td>
      <td class="${cls} amt-up">${fmtAmount(it.dealAmountManwon)}</td>
      <td class="${cls}">${fmtPricePerPyeong(it)}</td>
    </tr>`;
  });
  for(let i=items.length; i<8; i++){
    html += `<tr><th>${i+2}</th><td></td><td></td><td></td><td></td></tr>`;
  }
  html += `</tbody></table>`;
  return html;
}

function renderFeedSheet(){
  const sorted = [...currentItems].sort((a,b)=>{
    const da = `${a.dealYear}${String(a.dealMonth).padStart(2,"0")}${String(a.dealDay).padStart(2,"0")}`;
    const db = `${b.dealYear}${String(b.dealMonth).padStart(2,"0")}${String(b.dealDay).padStart(2,"0")}`;
    return db.localeCompare(da);
  });

  let html = `<table class="grid">
    <thead>
      <tr class="col-row1">
        <th style="width:30px"></th>
        <th>A</th><th>B</th><th>C</th><th>D</th><th>E</th>
      </tr>
      <tr>
        <th></th><th>거래일</th><th>단지명</th><th>면적</th><th>금액</th><th>평당가</th>
      </tr>
    </thead>
    <tbody>`;
  sorted.forEach((it, i)=>{
    const cls = it.isCancelled ? "cancelled" : "";
    const note = it.isCancelled ? " · 해제(취소)" : "";
    html += `<tr>
      <th>${i+2}</th>
      <td class="${cls}">${it.dealYear}.${String(it.dealMonth).padStart(2,"0")}.${String(it.dealDay).padStart(2,"0")}</td>
      <td class="${cls}">${it.aptNm}${note}</td>
      <td class="${cls}">${fmtAreaPyeong(it.excluUseAr)}</td>
      <td class="${cls} amt-up">${fmtAmount(it.dealAmountManwon)}</td>
      <td class="${cls}">${fmtPricePerPyeong(it)}</td>
    </tr>`;
  });
  for(let i=sorted.length; i<8; i++){
    html += `<tr><th>${i+2}</th><td></td><td></td><td></td><td></td><td></td></tr>`;
  }
  html += `</tbody></table>`;
  return html;
}

function render(){
  document.getElementById("watchArea").innerHTML = renderFlagshipSheet();
  document.getElementById("watchlistArea").innerHTML = renderWatchlistSheet();
  document.getElementById("feedArea").innerHTML = renderFeedSheet();
  document.getElementById("statusLeft").textContent = usingLiveData ? "실시간 데이터" : "샘플 데이터 (프로토타입)";
}

function populateSelects(){
  const lawdSel = document.getElementById("lawdSelect");
  SEOUL_GU.forEach(g=>{
    const opt = document.createElement("option");
    opt.value = g.lawd_cd;
    opt.textContent = g.name;
    if(g.lawd_cd === "11680") opt.selected = true;
    lawdSel.appendChild(opt);
  });

  const ymdSel = document.getElementById("ymdSelect");
  const base = new Date(2026, 5, 30); // 프로토타입 기준일: 2026-06-30
  for(let i=0; i<6; i++){
    const d = new Date(base.getFullYear(), base.getMonth()-i, 1);
    const val = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}`;
    const opt = document.createElement("option");
    opt.value = val;
    opt.textContent = `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}`;
    ymdSel.appendChild(opt);
  }
}

async function fetchLiveData(lawdCd, dealYmd){
  document.getElementById("statusNote").textContent = "데이터 조회 중...";
  try{
    const res = await fetch(`/api/apt-trade?lawdCd=${lawdCd}&dealYmd=${dealYmd}`);
    if(res.status === 404){
      throw new Error("백엔드 프록시 미연결 — /api/apt-trade 함수가 배포되지 않았습니다.");
    }
    const data = await res.json().catch(()=>{
      throw new Error(`API 응답 오류 (HTTP ${res.status}) — 응답이 JSON 형식이 아닙니다.`);
    });
    if(data.error) throw new Error(data.error);
    if(!res.ok) throw new Error(`API 응답 오류 (HTTP ${res.status})`);
    currentItems = data.items;
    usingLiveData = true;
    const guName = SEOUL_GU.find(g=>g.lawd_cd===lawdCd)?.name || lawdCd;
    document.getElementById("statusNote").textContent = `${guName} · ${dealYmd} · ${data.count}건 (실시간)`;
  }catch(e){
    // 실제 원인(환경변수 누락, API 오류 등)을 그대로 노출해 디버깅이 가능하도록 함
    currentItems = SAMPLE_ITEMS;
    usingLiveData = false;
    document.getElementById("statusNote").textContent = `샘플 데이터로 표시 중 — ${e.message}`;
  }
  render();
}

// dealYmd(YYYYMM) 기준 monthsBack개월 이전의 YYYYMM 반환
function getPrevYmd(dealYmd, monthsBack){
  const y = parseInt(dealYmd.slice(0,4), 10);
  const m = parseInt(dealYmd.slice(4,6), 10);
  const d = new Date(y, m - 1 - monthsBack, 1);
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}`;
}

// 특정 월의 전체 거래 목록 조회. 실패 시 빈 배열
async function fetchMonthItems(lawdCd, ymd){
  try{
    const res = await fetch(`/api/apt-trade?lawdCd=${lawdCd}&dealYmd=${ymd}`);
    if(!res.ok) return [];
    const data = await res.json().catch(()=>null);
    if(!data || data.error || !Array.isArray(data.items)) return [];
    return data.items;
  }catch(e){
    return [];
  }
}

// 최근 3개월(과거→현재 순)치 전체 거래 목록. 단지별 추이는 여기서 아파트명으로 걸러서 계산
async function fetchTrendDatasets(lawdCd, dealYmd){
  const months = [getPrevYmd(dealYmd,2), getPrevYmd(dealYmd,1), dealYmd];
  const itemsByMonth = await Promise.all(months.map(ym => fetchMonthItems(lawdCd, ym)));
  return months.map((ym, i)=> ({ ymd: ym, items: itemsByMonth[i] }));
}

// 특정 단지(aptNm)의 동일 평형(excluUseAr 기준) 최근 3개월 평균 거래금액 추이
function getApartmentTrend(datasets, aptNm, excluUseAr){
  if(!datasets) return null;
  const targetPyeong = Math.round(excluUseAr / 3.3058);
  return datasets.map(({ymd, items})=>{
    const matches = items.filter(it => it.aptNm === aptNm && Math.round(it.excluUseAr / 3.3058) === targetPyeong);
    if(!matches.length) return { ymd, avg: null };
    const sum = matches.reduce((s, it)=> s + (it.dealAmountManwon || 0), 0);
    return { ymd, avg: Math.round(sum / matches.length) };
  });
}

function renderInlineTrend(trend){
  if(!trend || trend.every(t => t.avg == null)) return "";
  const parts = trend.map((t, i)=>{
    const label = t.avg != null ? fmtAmount(t.avg) : "-";
    let arrow = "";
    if(i > 0){
      const prev = trend[i-1].avg;
      if(prev != null && t.avg != null){
        if(t.avg > prev) arrow = `<span class="trend-up">▲</span> `;
        else if(t.avg < prev) arrow = `<span class="trend-down">▼</span> `;
        else arrow = `<span class="trend-flat">-</span> `;
      }
    }
    return `${arrow}${label}`;
  }).join(" → ");
  return ` <span class="trend-inline">(${parts})</span>`;
}

document.getElementById("refreshBtn").addEventListener("click", async ()=>{
  const lawdCd = document.getElementById("lawdSelect").value;
  const dealYmd = document.getElementById("ymdSelect").value;
  await fetchLiveData(lawdCd, dealYmd);
  currentTrendDatasets = await fetchTrendDatasets(lawdCd, dealYmd);
  render();
});

// 현재 조회된 데이터(currentItems) 내에서만 단지명 검색 (추가 API 호출 없음)
function renderWatchSearchResults(query){
  const resultsEl = document.getElementById("watchSearchResults");
  const q = query.trim();
  const matches = q ? currentItems.filter(it => it.aptNm.includes(q)) : currentItems;
  const seen = new Set();
  const uniqueMatches = matches.filter(it => seen.has(it.aptNm) ? false : (seen.add(it.aptNm), true));

  if(!uniqueMatches.length){
    resultsEl.innerHTML = `<div class="modal-result-empty">일치하는 단지가 없습니다 (현재 조회된 지역·계약월 기준)</div>`;
    return;
  }
  resultsEl.innerHTML = uniqueMatches.map(it =>
    `<div class="modal-result-item" data-aptnm="${it.aptNm}"><span>${it.aptNm}</span><span class="pyeong">${it.umdNm}</span></div>`
  ).join("");
}

function openWatchModal(){
  document.getElementById("watchModalOverlay").classList.add("open");
  const input = document.getElementById("watchSearchInput");
  input.value = "";
  renderWatchSearchResults("");
  input.focus();
}

function closeWatchModal(){
  document.getElementById("watchModalOverlay").classList.remove("open");
}

document.getElementById("addWatchBtn").addEventListener("click", openWatchModal);
document.getElementById("watchModalCloseBtn").addEventListener("click", closeWatchModal);
document.getElementById("watchModalOverlay").addEventListener("click", (e)=>{
  if(e.target.id === "watchModalOverlay") closeWatchModal();
});
document.getElementById("watchSearchInput").addEventListener("input", (e)=>{
  renderWatchSearchResults(e.target.value);
});
document.getElementById("watchSearchResults").addEventListener("click", (e)=>{
  const item = e.target.closest(".modal-result-item");
  if(!item) return;
  const name = item.dataset.aptnm;
  const list = loadWatchlist();
  if(!list.includes(name)) list.push(name);
  saveWatchlist(list);
  render();
  closeWatchModal();
});

populateSelects();
fetchLiveData(document.getElementById("lawdSelect").value, document.getElementById("ymdSelect").value);
</script>
